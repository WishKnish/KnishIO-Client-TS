# TS SDK publish — tag-driven npm publish via Trusted Publishing / OIDC (cycle 177).
# Push a bare semver tag (TS uses no `v` prefix, e.g. `0.9.1`) → lint/typecheck/test/build gate → `npm publish`.
#
# Auth = npm Trusted Publishing (OIDC) — NO long-lived NPM_TOKEN. One-time maintainer setup:
#   npmjs.com → the `@wishknish/knishio-client-ts` package → Settings → Trusted Publisher →
#   GitHub Actions: organization `WishKnish`, repository `KnishIO-Client-TS`, workflow `publish.yml`.
#   (All fields case-sensitive; npm validates them only at publish time.)
# Requires npm >= 11.5.1 + Node >= 22.14 (we use Node 24 + `npm install -g npm@latest`). Provenance
# attestations are generated automatically under trusted publishing.
name: Publish

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  id-token: write   # OIDC for npm Trusted Publishing
  contents: write   # create the GitHub Release

jobs:
  publish:
    name: build, test, publish to npm (Trusted Publishing)
    runs-on: ubuntu-latest
    environment: release   # matches the npm trusted-publisher Environment + the repo's `release` env
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing needs npm >= 11.5.1 (newer than the bundled npm).
      - name: Upgrade npm (>= 11.5.1 for trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      # Gate — never publish a tag that doesn't lint/typecheck/test/build clean.
      - name: ESLint (lint gate)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build

      # OIDC trusted publishing: no NODE_AUTH_TOKEN; npm authenticates via the id-token and
      # auto-generates provenance. --access public keeps the scoped package public.
      - name: Publish to npm (Trusted Publishing)
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
