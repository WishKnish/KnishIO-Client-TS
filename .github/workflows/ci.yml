# TS SDK CI — enforces the ESLint gate (cycle 109) + the typecheck gate (cycle 110) + the vitest suite.
# Born-enforced: the repo had no CI, so both gates were local-only/bypassable until now.
name: CI

on: [push, pull_request]

jobs:
  gate:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # package-lock.json and yarn.lock coexist (yarn-managed, node-modules linker);
      # npm install is tolerant of lockfile drift, where npm ci would hard-fail.
      - name: Install dependencies
        run: npm install

      # The c109 lint gate (eslint.config.js, ESLint 9 flat config): 0 errors. `npm run lint`
      # is a pure check (cycle 126 made the package scripts CI-safe-by-default); the local
      # auto-fix variant is `npm run lint:fix`.
      - name: ESLint (lint gate)
        run: npm run lint

      # The c110 typecheck gate (tsc --noEmit): 0 errors.
      - name: Typecheck
        run: npm run typecheck

      # vitest unit suites. `npm test` is one-shot (`vitest run`, cycle 126); the local
      # watch variant is `npm run test:watch`.
      - name: Vitest
        run: npm test
